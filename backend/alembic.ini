[alembic]
script_location = kb_manager/alembic
sqlalchemy.url = postgresql+asyncpg://neondb_owner:npg_2PEFQzwDAW1t@ep-morning-grass-an4b1imx-pooler.c-6.us-east-1.aws.neon.tech/neondb?ssl=require

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
