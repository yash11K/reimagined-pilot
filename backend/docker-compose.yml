services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kb_manager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/kb_manager
      S3_BUCKET_NAME: my-kb-bucket
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic -c alembic.ini upgrade head &&
             uvicorn kb_manager.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
